<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AKEI Case</title>
  <meta name="description" content="AKEI automotive electronics repair case.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #090909;
      --panel: #121212;
      --panel2: #181818;
      --text: #f2f2f2;
      --muted: #a7a7a7;
      --border: #2b2b2b;
      --accent: #ff9d22;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--dark);
      color: var(--text);
      font-family: Inter, sans-serif;
    }

    a { color: inherit; }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 5vw;
      background: rgba(9,9,9,.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: Anton, sans-serif;
      letter-spacing: 5px;
      font-size: 30px;
      text-decoration: none;
    }

    .back {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      letter-spacing: 2px;
      text-decoration: none;
      font-size: 13px;
      text-transform: uppercase;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 56px 5vw 90px;
    }

    .service {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: Anton, sans-serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: .95;
      margin: 0 0 16px;
      text-transform: uppercase;
    }

    .car {
      font-family: 'Share Tech Mono', monospace;
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 32px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(320px, .8fr);
      gap: 38px;
      align-items: start;
    }

    .main-img {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      background: #000;
      border: 1px solid var(--border);
      cursor: zoom-in;
      display: block;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--border);
      cursor: pointer;
      opacity: .75;
      filter: grayscale(25%);
    }

    .thumb.active,
    .thumb:hover {
      opacity: 1;
      filter: grayscale(0);
      border-color: var(--accent);
    }

    .info {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 28px;
    }

    .desc {
      color: #ddd;
      line-height: 1.75;
      font-size: 16px;
      margin: 0 0 26px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .tag {
      border: 1px solid #5a3a18;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 7px 10px;
    }

    .quote {
      display: inline-block;
      padding: 14px 18px;
      background: var(--accent);
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .all-photos {
      margin-top: 46px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .all-photos img {
      width: 100%;
      display: block;
      border: 1px solid var(--border);
      cursor: zoom-in;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .all-photos { grid-template-columns: 1fr; }
      .thumbs { grid-template-columns: repeat(3, 1fr); }
    }
  
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      background: rgba(0,0,0,.96);
      color: var(--text);
      align-items: center;
      justify-content: center;
      padding: 24px;
      user-select: none;
      touch-action: none;
    }

    #lightbox.open {
      display: flex;
    }

    .lightbox-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #lightbox-img {
      max-width: 94vw;
      max-height: 88vh;
      object-fit: contain;
      cursor: zoom-in;
      transition: transform .18s ease;
      transform-origin: center center;
    }

    #lightbox-img.zoomed {
      cursor: zoom-out;
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      z-index: 1000000;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(10,10,10,.65);
      color: var(--text);
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 2px;
    }

    .lightbox-close {
      top: 22px;
      right: 22px;
      width: 48px;
      height: 48px;
      font-size: 28px;
      line-height: 1;
    }

    .lightbox-prev,
    .lightbox-next {
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 76px;
      font-size: 34px;
    }

    .lightbox-prev { left: 22px; }
    .lightbox-next { right: 22px; }

    .lightbox-counter {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 1000000;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 2px;
      font-size: 13px;
      background: rgba(10,10,10,.65);
      border: 1px solid rgba(255,255,255,.14);
      padding: 10px 14px;
    }

    @media (max-width: 700px) {
      #lightbox { padding: 10px; }
      #lightbox-img { max-width: 98vw; max-height: 82vh; }
      .lightbox-prev,
      .lightbox-next {
        width: 44px;
        height: 58px;
        font-size: 28px;
      }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
      .lightbox-close {
        top: 10px;
        right: 10px;
      }
    }

  
    .tech-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      background: var(--border);
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tech-item {
      background: var(--panel2);
      padding: 18px;
      min-height: 92px;
    }

    .tech-label {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 10px;
    }

    .tech-value {
      color: var(--text);
      line-height: 1.55;
      font-size: 15px;
    }

    .tech-value span {
      display: inline-block;
      margin: 0 8px 8px 0;
      padding: 6px 8px;
      border: 1px solid rgba(255,157,34,.35);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
    }

    @media (max-width: 700px) {
      .tech-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>
  <header class="top">
    <a class="logo" href="/">AKEI</a>
    <a class="back" href="/#cases">← Back to cases</a>
  </header>

  <main id="case-page">
    <div class="service">Loading case...</div>
    <h1>AKEI Case</h1>
  </main>
<script>
    const DATA_BASE = '/_data';
    let currentGallery = [];
    let currentLightboxIndex = 0;
    let lightboxZoom = 1;
    let touchStartX = 0;

    function currentSlug() {
      const parts = location.pathname.split('/').filter(Boolean);
      if (parts[0] === 'case' && parts[1]) return decodeURIComponent(parts[1]);
      const p = new URLSearchParams(location.search);
      return p.get('case') || p.get('id') || '';
    }

    function slugFromFile(file) {
      return String(file || '').replace(/^.*\//, '').replace(/\.json$/i, '');
    }

    function setMainImage(src, el) {
      const main = document.getElementById('main-img');
      if (!main) return;
      main.src = src;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });


    function renderTechValue(value) {
      if (Array.isArray(value)) {
        return value.map(v => `<span>${v}</span>`).join('');
      }
      return value || '—';
    }

    function buildTechnicalInfo(c) {
      const equipment = c.equipment || c.tools || c.tags || [];
      const status = c.status || 'Successfully completed';

      return `
        <div class="tech-grid">
          <div class="tech-item">
            <div class="tech-label">Vehicle / Equipment</div>
            <div class="tech-value">${renderTechValue(c.car || c.title)}</div>
          </div>
          <div class="tech-item">
            <div class="tech-label">Service</div>
            <div class="tech-value">${renderTechValue(c.service)}</div>
          </div>
          <div class="tech-item">
            <div class="tech-label">Tools / Process</div>
            <div class="tech-value">${renderTechValue(equipment)}</div>
          </div>
          <div class="tech-item">
            <div class="tech-label">Result</div>
            <div class="tech-value">✔ ${renderTechValue(status)}</div>
          </div>
        </div>
      `;
    }

    async function loadCase() {
      const slug = currentSlug();
      const page = document.getElementById('case-page');

      try {
        const index = await fetch(`${DATA_BASE}/cases-index.json`).then(r => r.json());
        const file = index.find(f => slugFromFile(f) === slug) || index.find(f => String(f).includes(slug));

        if (!file) throw new Error('Case not found');

        const c = await fetch(`${DATA_BASE}/cases/${file}`).then(r => r.json());
        const gallery = c.gallery || c.images || (c.image ? [c.image] : []);
        const cover = c.cover_image || c.image || gallery[0] || '';
        currentGallery = gallery.length ? gallery : (cover ? [cover] : []);

        document.title = `${c.title || 'AKEI Case'} — AKEI`;
        const meta = document.querySelector('meta[name="description"]');
        if (meta && c.meta_description) meta.setAttribute('content', c.meta_description);

        page.innerHTML = `
          <div class="service">${c.service || ''}</div>
          <h1>${c.title || ''}</h1>
          <div class="car">${c.car || ''}</div>

          <div class="layout">
            <section>
              ${cover ? `<img id="main-img" class="main-img" src="${cover}" alt="${c.image_alt || c.title || ''}" onclick="openLightboxBySrc(this.src)">` : ''}
              ${gallery.length > 1 ? `
                <div class="thumbs">
                  ${gallery.map((img, i) => `
                    <img class="thumb ${i === 0 ? 'active' : ''}" src="${img}" alt="${c.image_alt || c.title || ''}" onclick="setMainImage('${img}', this)">
                  `).join('')}
                </div>
              ` : ''}
            </section>

            <aside class="info">
              ${buildTechnicalInfo(c)}
              <p class="desc">${c.description || ''}</p>
              <div class="tags">
                ${(c.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
              <a class="quote" href="/#contact">Get quote</a>
            </aside>
          </div>

          ${gallery.length ? `
            <section class="all-photos">
              ${gallery.map(img => `<img src="${img}" alt="${c.image_alt || c.title || ''}" onclick="openLightboxBySrc(this.src)">`).join('')}
            </section>
          ` : ''}
        `;
      } catch (err) {
        page.innerHTML = `
          <div class="service">Case not found</div>
          <h1>404</h1>
          <p class="desc">This case could not be loaded.</p>
          <a class="quote" href="/#cases">Back to cases</a>
        `;
      }
    }


    function updateLightbox() {
      const box = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const counter = document.getElementById('lightbox-counter');
      if (!box || !img || !currentGallery.length) return;

      const src = currentGallery[currentLightboxIndex];
      img.src = src;
      img.alt = document.getElementById('main-img')?.alt || '';
      lightboxZoom = 1;
      img.classList.remove('zoomed');
      img.style.transform = 'scale(1)';
      counter.textContent = `${currentLightboxIndex + 1} / ${currentGallery.length}`;
    }

    function openLightboxBySrc(src) {
      if (!currentGallery.length) return;

      const cleanSrc = String(src || '').split(location.origin).join('');
      const found = currentGallery.findIndex(x => cleanSrc.endsWith(x) || x.endsWith(cleanSrc));
      currentLightboxIndex = found >= 0 ? found : 0;

      document.getElementById('lightbox').classList.add('open');
      updateLightbox();
    }

    function closeLightbox() {
      const box = document.getElementById('lightbox');
      if (box) box.classList.remove('open');
    }

    function nextLightbox(e) {
      if (e) e.stopPropagation();
      if (!currentGallery.length) return;
      currentLightboxIndex = (currentLightboxIndex + 1) % currentGallery.length;
      updateLightbox();
    }

    function prevLightbox(e) {
      if (e) e.stopPropagation();
      if (!currentGallery.length) return;
      currentLightboxIndex = (currentLightboxIndex - 1 + currentGallery.length) % currentGallery.length;
      updateLightbox();
    }

    function toggleZoom(e) {
      const img = document.getElementById('lightbox-img');
      if (!img) return;

      lightboxZoom = lightboxZoom === 1 ? 2 : 1;
      img.style.transform = `scale(${lightboxZoom})`;
      img.classList.toggle('zoomed', lightboxZoom > 1);
    }

    document.addEventListener('wheel', function(e) {
      const box = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      if (!box || !box.classList.contains('open') || !img) return;

      e.preventDefault();
      lightboxZoom += e.deltaY < 0 ? 0.15 : -0.15;
      lightboxZoom = Math.max(1, Math.min(3, lightboxZoom));
      img.style.transform = `scale(${lightboxZoom})`;
      img.classList.toggle('zoomed', lightboxZoom > 1);
    }, { passive: false });

    document.addEventListener('keydown', e => {
      const box = document.getElementById('lightbox');
      const isOpen = box && box.classList.contains('open');

      if (e.key === 'Escape') closeLightbox();
      if (isOpen && e.key === 'ArrowRight') nextLightbox(e);
      if (isOpen && e.key === 'ArrowLeft') prevLightbox(e);
    });

    document.addEventListener('touchstart', function(e) {
      const box = document.getElementById('lightbox');
      if (!box || !box.classList.contains('open')) return;
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      const box = document.getElementById('lightbox');
      if (!box || !box.classList.contains('open')) return;

      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 45) {
        dx < 0 ? nextLightbox(e) : prevLightbox(e);
      }
    }, { passive: true });

    loadCase();
  </script>

  <div id="lightbox">
    <button class="lightbox-close" type="button" onclick="closeLightbox()">×</button>
    <button class="lightbox-prev" type="button" onclick="prevLightbox(event)">‹</button>
    <div class="lightbox-stage" onclick="toggleZoom(event)">
      <img id="lightbox-img" src="" alt="">
    </div>
    <button class="lightbox-next" type="button" onclick="nextLightbox(event)">›</button>
    <div class="lightbox-counter" id="lightbox-counter">1 / 1</div>
  </div>

</body>
</html>
