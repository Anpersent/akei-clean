<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AKEI Case</title>
  <meta name="description" content="AKEI automotive electronics repair case.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #090909;
      --panel: #121212;
      --panel2: #181818;
      --text: #f2f2f2;
      --muted: #a7a7a7;
      --border: #2b2b2b;
      --accent: #ff9d22;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--dark);
      color: var(--text);
      font-family: Inter, sans-serif;
    }

    a { color: inherit; }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 5vw;
      background: rgba(9,9,9,.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: Anton, sans-serif;
      letter-spacing: 5px;
      font-size: 30px;
      text-decoration: none;
    }

    .back {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      letter-spacing: 2px;
      text-decoration: none;
      font-size: 13px;
      text-transform: uppercase;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 56px 5vw 90px;
    }

    .service {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: Anton, sans-serif;
      font-size: clamp(42px, 7vw, 92px);
      line-height: .95;
      margin: 0 0 16px;
      text-transform: uppercase;
    }

    .car {
      font-family: 'Share Tech Mono', monospace;
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 32px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(320px, .8fr);
      gap: 38px;
      align-items: start;
    }

    .main-img {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      background: #000;
      border: 1px solid var(--border);
      cursor: zoom-in;
      display: block;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--border);
      cursor: pointer;
      opacity: .75;
      filter: grayscale(25%);
    }

    .thumb.active,
    .thumb:hover {
      opacity: 1;
      filter: grayscale(0);
      border-color: var(--accent);
    }

    .info {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 28px;
    }

    .desc {
      color: #ddd;
      line-height: 1.75;
      font-size: 16px;
      margin: 0 0 26px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .tag {
      border: 1px solid #5a3a18;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 7px 10px;
    }

    .quote {
      display: inline-block;
      padding: 14px 18px;
      background: var(--accent);
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .all-photos {
      margin-top: 46px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .all-photos img {
      width: 100%;
      display: block;
      border: 1px solid var(--border);
      cursor: zoom-in;
    }

    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.94);
      padding: 24px;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 96vw;
      max-height: 92vh;
      object-fit: contain;
      cursor: zoom-out;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .all-photos { grid-template-columns: 1fr; }
      .thumbs { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="logo" href="/">AKEI</a>
    <a class="back" href="/#cases">← Back to cases</a>
  </header>

  <main id="case-page">
    <div class="service">Loading case...</div>
    <h1>AKEI Case</h1>
  </main>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const DATA_BASE = '/_data';

    function currentSlug() {
      const parts = location.pathname.split('/').filter(Boolean);
      if (parts[0] === 'case' && parts[1]) return decodeURIComponent(parts[1]);
      const p = new URLSearchParams(location.search);
      return p.get('case') || p.get('id') || '';
    }

    function slugFromFile(file) {
      return String(file || '').replace(/^.*\//, '').replace(/\.json$/i, '');
    }

    function setMainImage(src, el) {
      const main = document.getElementById('main-img');
      if (!main) return;
      main.src = src;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    function openLightbox(src, alt) {
      const box = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = src;
      img.alt = alt || '';
      box.classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    async function loadCase() {
      const slug = currentSlug();
      const page = document.getElementById('case-page');

      try {
        const index = await fetch(`${DATA_BASE}/cases-index.json`).then(r => r.json());
        const file = index.find(f => slugFromFile(f) === slug) || index.find(f => String(f).includes(slug));

        if (!file) throw new Error('Case not found');

        const c = await fetch(`${DATA_BASE}/cases/${file}`).then(r => r.json());
        const gallery = c.gallery || c.images || (c.image ? [c.image] : []);
        const cover = c.cover_image || c.image || gallery[0] || '';

        document.title = `${c.title || 'AKEI Case'} — AKEI`;
        const meta = document.querySelector('meta[name="description"]');
        if (meta && c.meta_description) meta.setAttribute('content', c.meta_description);

        page.innerHTML = `
          <div class="service">${c.service || ''}</div>
          <h1>${c.title || ''}</h1>
          <div class="car">${c.car || ''}</div>

          <div class="layout">
            <section>
              ${cover ? `<img id="main-img" class="main-img" src="${cover}" alt="${c.image_alt || c.title || ''}" onclick="openLightbox(this.src, this.alt)">` : ''}
              ${gallery.length > 1 ? `
                <div class="thumbs">
                  ${gallery.map((img, i) => `
                    <img class="thumb ${i === 0 ? 'active' : ''}" src="${img}" alt="${c.image_alt || c.title || ''}" onclick="setMainImage('${img}', this)">
                  `).join('')}
                </div>
              ` : ''}
            </section>

            <aside class="info">
              <p class="desc">${c.description || ''}</p>
              <div class="tags">
                ${(c.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
              <a class="quote" href="/#contact">Get quote</a>
            </aside>
          </div>

          ${gallery.length ? `
            <section class="all-photos">
              ${gallery.map(img => `<img src="${img}" alt="${c.image_alt || c.title || ''}" onclick="openLightbox(this.src, this.alt)">`).join('')}
            </section>
          ` : ''}
        `;
      } catch (err) {
        page.innerHTML = `
          <div class="service">Case not found</div>
          <h1>404</h1>
          <p class="desc">This case could not be loaded.</p>
          <a class="quote" href="/#cases">Back to cases</a>
        `;
      }
    }

    loadCase();
  </script>
</body>
</html>
